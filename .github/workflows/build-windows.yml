name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'  # Запуск при создании тега вида v1.0.0
  workflow_dispatch:  # Ручной запуск из интерфейса GitHub

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        architecture: 'x64'

    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: 🔨 Build EXE with PyInstaller
      run: |
        pyinstaller --name NetScanner ^
                    --onefile ^
                    --windowed ^
                    --icon=NONE ^
                    --hidden-import=pydantic ^
                    --hidden-import=PyQt6.QtCore ^
                    --hidden-import=PyQt6.QtGui ^
                    --hidden-import=PyQt6.QtWidgets ^
                    --hidden-import=PyQt6.sip ^
                    app/main.py

    - name: 📦 Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: NetScanner-Windows
        path: dist/NetScanner.exe
        retention-days: 30

    - name: 🚀 Create Release (если тег)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/NetScanner.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}